# render.yaml
services:
  - type: web
    name: unifiededu-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: MIN_CLIENTS
        value: 2
      - key: ROUND_TIMEOUT
        value: 300
      - key: PYTHON_VERSION
        value: 3.10.13
