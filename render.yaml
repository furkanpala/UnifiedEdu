# render.yaml
services:
  - type: web
    name: unifiededu
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    healthCheckPath: /health
    envVars:
      - key: MIN_CLIENTS
        value: 2
      - key: ROUND_TIMEOUT
        value: 300
